# .github/workflows/supabase-keepalive.yml
# Keeps Render awake (sleeps after 15 min on free tier) and Supabase active
# (pauses after 7 days of inactivity) by pinging the live backend every 14 minutes.
# Uses roughly 3% of GitHub's free 2000 monthly minutes.

name: Keep-Alive

on:
  schedule:
    # Every 14 minutes — keeps Render from sleeping and Supabase from pausing
    - cron: '*/14 * * * *'
  workflow_dispatch:
    # Allows manual trigger from GitHub UI to test it's working

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping backend (wakes Render + touches Supabase DB)
        # POSTing to the login endpoint queries the users table even on a failed auth.
        # That's enough to reset Supabase's inactivity timer.
        # A 401 response is expected and fine — it means the DB was reached.
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -d '{"email":"admin@iles.com","password":"keepalive-ping"}' \
            https://iles-backend-9ydy.onrender.com/api/auth/login/)
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" = "000" ]; then
            echo "ERROR: Could not reach the backend at all."
            exit 1
          fi

      - name: Confirm ping completed
        run: echo "Backend pinged at $(date UTC)"
