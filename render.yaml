# render.yaml
# Render's instruction manual — lives at root next to manage.py

services:
  - type: web
    name: iles-backend
    runtime: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "your-app.onrender.com"
      - key: SECRET_KEY
        value: "placeholder-replace-in-dashboard"
      - key: DATABASE_URL
        value: "placeholder-replace-in-dashboard"
      - key: CORS_ALLOWED_ORIGINS
        value: "placeholder-replace-in-dashboard"
        