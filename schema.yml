      enum:
      - DRAFT
      - MISSED
      - SUBMITTED
      - REVIEWED
      - APPROVED
      type: string
      description: |-
        * `DRAFT` - Draft
        * `MISSED` - Missed
        * `SUBMITTED` - Submitted
        * `REVIEWED` - Reviewed
        * `APPROVED` - Approved
