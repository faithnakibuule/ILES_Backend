          - $ref: '#/components/schemas/PlacementStatusEnum'
          readOnly: true
      required:
      - academic_supervisor
      - company
      - end_date
      - id
      - start_date
      - status
      - student
      - student_id
      - workplace_supervisor
      - workplace_supervisor_id
    PlacementStatusEnum:
      enum:
      - PENDING
      - ACTIVE
      - COMPLETED
      - CANCELLED
      type: string
      description: |-
        * `PENDING` - Pending
        * `ACTIVE` - Active
        * `COMPLETED` - Completed
        * `CANCELLED` - Cancelled
    Register:
      type: object
      properties:
        email:
          type: string
          format: email
          maxLength: 254
        role:
          $ref: '#/components/schemas/RoleEnum'
        first_name:
          type: string
        last_name:
          type: string
        password:
          type: string
          writeOnly: true
        confirm_password:
          type: string
          writeOnly: true
        company_id:
          type: integer
          writeOnly: true
          nullable: true
        college_id:
          type: integer
          writeOnly: true
          nullable: true
        course_id:
          type: integer
          writeOnly: true
          nullable: true
        course_name:
          type: string
          writeOnly: true
          nullable: true
      required:
      - confirm_password
      - email
      - password
    RoleEnum:
      enum:
      - student
      - workplace_supervisor
      - academic_supervisor
      - admin
      type: string
      description: |-
        * `student` - Student
        * `workplace_supervisor` - Workplace Supervisor
        * `academic_supervisor` - Academic Supervisor
        * `admin` - Admin
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
      required:
      - access
      - refresh
    User:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        email:
          type: string
          format: email
          maxLength: 254
        role:
          $ref: '#/components/schemas/RoleEnum'
        full_name:
          type: string
          readOnly: true
      required:
      - email
      - full_name
      - id
    UserUpdate:
      type: object
      properties:
        full_name:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        phone:
          type: string
          nullable: true
          maxLength: 20
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
