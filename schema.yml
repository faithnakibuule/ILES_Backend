          description: No response body
  /api/admin/users/:
    get:
      operationId: admin_users_list
      description: |-
        Admin-only control panel for managing all users.
        Supports filtering by role, searching by name/email,
        creating users, and deactivating users.
      parameters:
      - in: query
        name: company
        schema:
          type: integer
      - in: query
        name: is_active
        schema:
          type: boolean
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: role
        schema:
          type: string
          enum:
          - academic_supervisor
          - admin
          - student
          - workplace_supervisor
        description: |-
          * `student` - Student
          * `workplace_supervisor` - Workplace Supervisor
          * `academic_supervisor` - Academic Supervisor
          * `admin` - Admin
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - admin
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAdminUserList'
          description: ''
    post:
      operationId: admin_users_create
      description: |-
        Admin-only control panel for managing all users.
        Supports filtering by role, searching by name/email,
        creating users, and deactivating users.
      tags:
      - admin
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUser'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AdminUser'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AdminUser'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUser'
          description: ''
