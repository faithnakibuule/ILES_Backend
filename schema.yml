openapi: 3.0.3
info:
  title: ILES Backend API
  version: 1.0.0
  description: API documentation for the ILES Backend, built with Django REST Framework
    and drf-spectacular.
paths:
  /api/academic-overview/:
    get:
      operationId: academic_overview_retrieve
      tags:
      - academic-overview
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/academic-stats/:
    get:
      operationId: academic_stats_retrieve
