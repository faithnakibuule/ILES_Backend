          type: string
          format: email
          maxLength: 254
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        fullname:
          type: string
          readOnly: true
        role:
          $ref: '#/components/schemas/RoleEnum'
        phone:
          type: string
          nullable: true
          maxLength: 20
        is_active:
          type: boolean
          title: Active
          description: Designates whether this user should be treated as active. Unselect
            this instead of deleting accounts.
        company:
          type: string
          readOnly: true
        company_id:
          type: integer
          writeOnly: true
          nullable: true
        course:
          type: string
          readOnly: true
        course_id:
          type: integer
          writeOnly: true
          nullable: true
        college:
          type: string
          readOnly: true
        college_id:
          type: integer
          writeOnly: true
          nullable: true
        password:
          type: string
          writeOnly: true
        date_joined:
          type: string
          format: date-time
          readOnly: true
      required:
      - college
      - company
      - course
      - date_joined
      - email
      - fullname
      - id
    College:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        academic_supervisor_count:
          type: integer
          readOnly: true
        course_count:
          type: integer
          readOnly: true
      required:
      - academic_supervisor_count
      - course_count
      - id
      - name
    Company:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        supervisor_count:
          type: integer
          readOnly: true
        supervisors:
          type: string
          readOnly: true
        supervisor_ids:
          type: array
          items:
            type: integer
          writeOnly: true
      required:
      - id
      - name
      - supervisor_count
      - supervisors
    Course:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        college:
          type: string
          readOnly: true
        college_id:
          type: integer
          writeOnly: true
          nullable: true
      required:
      - college
      - id
      - name
    CustomTokenObtainPair:
      type: object
      properties:
        email:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
      required:
      - email
      - password
    CustomUser:
      type: object
